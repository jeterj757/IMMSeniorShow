/* ── IMM 2026 Global Design Tokens ── */
:root {
  --imm-display: "Norwester", "Arial Narrow", Impact, sans-serif;
  --imm-ui:      "Avenir Next", "Avenir", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  --imm-ui-tracking: -0.012em;

  /* Core palette */
  --imm-forest:      #123f36;
  --imm-forest-deep: #0c2b24;
  --imm-rust:        #c75145;
  --imm-orange:      #cd7028;
  --imm-amber:       #d6a034;
  --imm-green:       #4e985f;
  --imm-blue:        #3f6f9b;
  --imm-violet:      #8d5aa9;
  --imm-paper:       #f3edda;
  --imm-ink:         #1c2422;

  /* Track / trail colours */
  --imm-track-gp: #c75145;  /* Games & Playable Media     */
  --imm-track-vs: #cd7028;  /* Visual Storytelling & Anim */
  --imm-track-mt: #d6a034;  /* Music Technology            */
  --imm-track-df: #4e985f;  /* Digital Fabrication         */
  --imm-track-cc: #3f6f9b;  /* Creative Coding             */
  --imm-track-ct: #8d5aa9;  /* Culture & Technology        */

  /* Shared effects */
  --imm-pill:       999px;
  --imm-btn-shadow: 0 5px 0 rgba(12, 36, 26, 0.55);
  --imm-card-shadow: 0 14px 32px rgba(10, 38, 28, 0.32);
}

/* ── Full-page section scroll snap ──
   Each .imm-section snaps to the viewport on the home page.
   NOTE: if this conflicts with Squarespace's own scroll on other pages,
   scope it to the home page body class or remove from this global inject. */
html {
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

/* Base styles shared by all four homepage sections */
.imm-section {
  height: 100svh;
  min-height: 100svh;
  scroll-snap-align: start;
  overflow: hidden;
  position: relative;
  box-sizing: border-box;
}

body,
p,
a,
li,
button,
input,
textarea,
label,
small {
  letter-spacing: var(--imm-ui-tracking);
}
</style>
